<!DOCTYPE html>
<html data-destination="https://clarkhacks.com/">

<head>
    <noscript>
        <meta id="redirect" http-equiv="refresh" content="0; url=https://clarkhacks.com/">
    </noscript>
</head>

<body>
    If you are not redirected click
    <a id="redirect_link" href="https://clarkhacks.com/">here</a>.
    <!-- Redirect in JavaScript with meta refresh fallback above in noscript -->
    <script>
        var destination = document.documentElement.getAttribute('data-destination');
        window.location.href = destination + (window.location.search || '') + (window.location.hash || '');
        var a = document.getElementById('redirect_link');
        a.href = destination + (window.location.search || '') + (window.location.hash || '');
    </script>
</body>

</html>
